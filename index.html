<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation — Eng. Dereje & Eng. Hawi</title>
    <meta name="description" content="You are warmly invited to celebrate the wedding of Eng. Dereje Itefa & Eng. Hawi Teshome">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&family=Noto+Serif+Ethiopic:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ========== CSS VARIABLES ========== */
        :root {
            --gold: #C9A84C;
            --gold-light: #E8D48B;
            --gold-dark: #A07D2E;
            --cream: #FDF8F0;
            --cream-dark: #F5EBD9;
            --brown: #5C3D2E;
            --brown-light: #8B6548;
            --brown-dark: #3A2518;
            --burgundy: #6B2D3E;
            --sage: #8B9A6B;
            --white: #FFFFFF;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Montserrat', 'Segoe UI', sans-serif;
            --font-amharic: 'Noto Serif Ethiopic', serif;
        }

        /* ========== RESET & BASE ========== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--cream);
            color: var(--brown);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Ethiopic font for Amharic & Oromo where needed */
        body.lang-am, body.lang-om {
            --font-body-override: 'Noto Serif Ethiopic', serif;
        }

        body.lang-am .section-title,
        body.lang-am .detail-label,
        body.lang-am .detail-value,
        body.lang-am .countdown-label,
        body.lang-am .message-body,
        body.lang-am .message-signature,
        body.lang-am .invitation-prefix,
        body.lang-am .wedding-label,
        body.lang-am .section-subtitle,
        body.lang-am .map-link,
        body.lang-am .map-address,
        body.lang-am .wish-input,
        body.lang-am .wish-submit,
        body.lang-am .wish-card-name,
        body.lang-am .wish-card-message,
        body.lang-am .wish-status {
            font-family: var(--font-amharic);
        }

        body.lang-om .section-title,
        body.lang-om .invitation-prefix,
        body.lang-om .wedding-label {
            font-family: var(--font-body);
        }

        /* ========== LANGUAGE SWITCHER ========== */
        .lang-switcher {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 2000;
            display: flex;
            gap: 0;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(58, 37, 24, 0.15);
            border: 1px solid var(--gold-light);
        }

        .lang-btn {
            background: rgba(253, 248, 240, 0.95);
            border: none;
            padding: 8px 14px;
            font-family: var(--font-body);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: var(--brown-light);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .lang-btn:not(:last-child) {
            border-right: 1px solid var(--gold-light);
        }

        .lang-btn:hover {
            background: var(--gold-light);
            color: var(--brown-dark);
        }

        .lang-btn.active {
            background: var(--gold-dark);
            color: var(--white);
        }

        /* ========== ETHIOPIAN BORDER PATTERN ========== */
        .tilet-border {
            width: 100%;
            height: 24px;
            background-image: repeating-linear-gradient(
                90deg,
                var(--gold) 0px, var(--gold) 6px,
                transparent 6px, transparent 10px,
                var(--burgundy) 10px, var(--burgundy) 16px,
                transparent 16px, transparent 20px,
                var(--sage) 20px, var(--sage) 26px,
                transparent 26px, transparent 30px
            );
            opacity: 0.7;
        }

        .tilet-border-diamond {
            width: 100%;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
        }

        .tilet-border-diamond span {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--gold);
            transform: rotate(45deg);
            opacity: 0.6;
        }

        .tilet-border-diamond span:nth-child(odd) {
            background: var(--burgundy);
            width: 8px;
            height: 8px;
        }

        /* ========== PETAL ANIMATION ========== */
        .petal-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            top: -20px;
            opacity: 0;
            animation: petalFall linear infinite;
        }

        .petal svg {
            width: 16px;
            height: 16px;
        }

        @keyframes petalFall {
            0% {
                opacity: 0;
                transform: translateX(0) rotate(0deg);
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                opacity: 0;
                transform: translateX(80px) rotate(360deg);
                top: 100vh;
            }
        }

        /* ========== FADE-IN ANIMATIONS ========== */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ========== HERO SECTION ========== */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            position: relative;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(201, 168, 76, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(107, 45, 62, 0.06) 0%, transparent 50%),
                var(--cream);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 15% 15%, var(--gold) 1px, transparent 1px),
                radial-gradient(circle at 85% 20%, var(--gold) 1px, transparent 1px),
                radial-gradient(circle at 50% 80%, var(--gold) 0.5px, transparent 0.5px);
            opacity: 0.15;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .invitation-prefix {
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--brown-light);
            margin-bottom: 12px;
        }

        .amharic-greeting {
            font-family: var(--font-amharic);
            font-size: 1.1rem;
            color: var(--gold-dark);
            margin-bottom: 24px;
            font-weight: 300;
        }

        .couple-names {
            font-family: var(--font-display);
            font-weight: 300;
            font-size: clamp(2.8rem, 8vw, 5.5rem);
            line-height: 1.15;
            color: var(--brown-dark);
            margin-bottom: 8px;
        }

        .couple-names .amp {
            display: block;
            font-style: italic;
            font-size: 0.45em;
            color: var(--gold);
            margin: 4px 0;
        }

        .wedding-label {
            font-family: var(--font-body);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold-dark);
            margin-top: 16px;
            margin-bottom: 32px;
        }

        .hero-date {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 400;
            color: var(--brown-light);
            letter-spacing: 2px;
        }

        .hero-date-eth {
            font-family: var(--font-amharic);
            margin-top: 8px;
            font-size: 0.95rem;
            color: var(--gold-dark);
        }

        /* ========== PHOTO SECTION ========== */
        .photo-section {
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .photo-frame {
            position: relative;
            width: min(85vw, 420px);
            aspect-ratio: 3/4;
            border: 3px solid var(--gold);
            padding: 10px;
            background: var(--white);
            box-shadow: 0 20px 60px rgba(92, 61, 46, 0.12);
        }

        .photo-frame::before {
            content: '';
            position: absolute;
            inset: 16px;
            border: 1px solid var(--gold-light);
            pointer-events: none;
        }

        /* ========== DETAILS SECTION ========== */
        .details-section {
            padding: 60px 20px;
            text-align: center;
            background:
                linear-gradient(180deg, var(--cream) 0%, var(--cream-dark) 50%, var(--cream) 100%);
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 300;
            color: var(--brown-dark);
            margin-bottom: 8px;
        }

        .section-subtitle {
            font-family: var(--font-body);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold-dark);
            margin-bottom: 40px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 36px;
            max-width: 600px;
            margin: 0 auto;
        }

        .detail-card {
            padding: 28px 20px;
            background: var(--white);
            border: 1px solid rgba(201, 168, 76, 0.25);
            position: relative;
        }

        .detail-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: var(--gold);
        }

        .detail-icon {
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        .detail-label {
            font-family: var(--font-body);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold-dark);
            margin-bottom: 8px;
        }

        .detail-value {
            font-family: var(--font-display);
            font-size: 1.35rem;
            font-weight: 400;
            color: var(--brown-dark);
            line-height: 1.5;
        }

        .detail-value small {
            display: block;
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--brown-light);
            margin-top: 4px;
            font-weight: 300;
        }

        /* ========== COUNTDOWN ========== */
        .countdown-section {
            padding: 60px 20px;
            text-align: center;
        }

        .countdown-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 500px;
            margin: 0 auto;
        }

        .countdown-item {
            min-width: 80px;
        }

        .countdown-number {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 300;
            color: var(--brown-dark);
            line-height: 1;
        }

        .countdown-label {
            font-family: var(--font-body);
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold-dark);
            margin-top: 4px;
        }

        /* ========== MESSAGE SECTION ========== */
        .message-section {
            padding: 60px 20px;
            text-align: center;
            background:
                linear-gradient(180deg, var(--cream) 0%, var(--cream-dark) 50%, var(--cream) 100%);
        }

        .message-body {
            max-width: 560px;
            margin: 0 auto;
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 300;
            font-style: italic;
            line-height: 1.8;
            color: var(--brown);
            padding: 0 10px;
        }

        .message-signature {
            font-family: var(--font-display);
            font-size: 1.1rem;
            color: var(--gold-dark);
            margin-top: 24px;
            font-weight: 400;
        }

        /* ========== MAP SECTION ========== */
        .map-section {
            padding: 60px 20px;
            text-align: center;
        }

        .map-container {
            max-width: 600px;
            margin: 0 auto;
            border: 2px solid var(--gold-light);
            overflow: hidden;
        }

        .map-container iframe {
            width: 100%;
            height: 320px;
            border: 0;
        }

        .map-hint {
            max-width: 500px;
            margin: 16px auto 0;
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: var(--brown-light);
            line-height: 1.5;
        }

        .map-link {
            display: inline-block;
            margin-top: 20px;
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--white);
            background: var(--gold-dark);
            padding: 14px 32px;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .map-link:hover {
            background: var(--brown-dark);
        }

        .map-address {
            margin-top: 16px;
            font-family: var(--font-amharic);
            font-size: 0.95rem;
            color: var(--brown-light);
        }

        /* ========== MAP PHONE ========== */
        .map-phone {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--brown-dark);
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(201, 168, 76, 0.3);
            transition: all 0.3s ease;
        }

        .map-phone:hover {
            border-color: var(--gold);
            background: var(--white);
        }

        /* ========== WISHES SECTION ========== */
        .wishes-section {
            padding: 60px 20px;
            text-align: center;
            background:
                linear-gradient(180deg, var(--cream) 0%, var(--cream-dark) 50%, var(--cream) 100%);
        }

        .wish-form {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .wish-input {
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--brown-dark);
            background: var(--white);
            border: 1px solid rgba(201, 168, 76, 0.25);
            padding: 14px 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .wish-input:focus {
            border-color: var(--gold);
        }

        .wish-input::placeholder {
            color: var(--brown-light);
            opacity: 0.6;
        }

        .wish-textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
        }

        .wish-submit {
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--white);
            background: var(--gold-dark);
            padding: 14px 32px;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .wish-submit:hover {
            background: var(--brown-dark);
        }

        .wish-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .wish-status {
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--gold-dark);
            min-height: 20px;
        }

        .wish-status.error {
            color: var(--burgundy);
        }

        .wishes-list {
            max-width: 500px;
            margin: 32px auto 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .wish-card {
            background: var(--white);
            border: 1px solid rgba(201, 168, 76, 0.25);
            padding: 20px;
            text-align: left;
            position: relative;
        }

        .wish-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: var(--gold);
        }

        .wish-card-name {
            font-family: var(--font-display);
            font-size: 1.1rem;
            color: var(--gold-dark);
            font-weight: 600;
        }

        .wish-card-message {
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: var(--brown);
            margin-top: 8px;
            line-height: 1.5;
        }

        .wish-card-time {
            font-family: var(--font-body);
            font-size: 0.65rem;
            color: var(--brown-light);
            margin-top: 8px;
        }

        .wishes-empty {
            font-family: var(--font-display);
            font-size: 1rem;
            font-style: italic;
            color: var(--brown-light);
            margin-top: 24px;
        }

        /* ========== FOOTER ========== */
        .footer {
            padding: 40px 20px;
            text-align: center;
            background: var(--brown-dark);
            color: var(--cream-dark);
        }

        .footer-names {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 300;
            color: var(--gold-light);
            margin-bottom: 8px;
        }

        .footer-blessing {
            font-family: var(--font-amharic);
            font-size: 1rem;
            color: var(--gold);
            margin-bottom: 16px;
        }

        .footer-date {
            font-family: var(--font-body);
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: rgba(253, 248, 240, 0.5);
        }

        /* ========== HABESHA WOVEN PATTERN DIVIDER ========== */
        .woven-divider {
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 20px 0;
        }

        .woven-divider .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .woven-divider .diamond {
            width: 8px;
            height: 8px;
            background: var(--gold);
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        /* ========== RESPONSIVE ========== */
        @media (min-width: 640px) {
            .details-grid {
                grid-template-columns: 1fr 1fr;
            }

            .detail-card:last-child:nth-child(odd) {
                grid-column: 1 / -1;
                max-width: 300px;
                justify-self: center;
                width: 100%;
            }
        }

        @media (min-width: 768px) {
            .hero {
                padding: 80px 40px;
            }

            .countdown-item {
                min-width: 100px;
            }

            .countdown-number {
                font-size: 3.8rem;
            }
        }

        @media (max-width: 420px) {
            .lang-switcher {
                top: 10px;
                right: 10px;
            }
            .lang-btn {
                padding: 6px 10px;
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <!-- Language Switcher -->
    <nav class="lang-switcher" aria-label="Language">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="am">አማ</button>
        <button class="lang-btn" data-lang="om">OM</button>
        <button class="lang-btn" data-lang="fr">FR</button>
    </nav>

    <!-- Falling Petals -->
    <div class="petal-container" id="petalContainer"></div>

    <!-- ===== HERO ===== -->
    <section class="hero">
        <div class="hero-content fade-in">
            <p class="invitation-prefix" data-i18n="hosts"></p>
            <p class="amharic-greeting" style="font-size: 0.85rem; margin-bottom: 8px;" data-i18n="hostsNative"></p>
            <p class="invitation-prefix" style="margin-bottom: 4px; letter-spacing: 3px;" data-i18n="inviteLine"></p>

            <div class="tilet-border-diamond">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>

            <h1 class="couple-names" data-i18n-html="coupleNames"></h1>

            <div class="tilet-border-diamond">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>

            <p class="amharic-greeting" data-i18n="congratsLine"></p>
            <p class="wedding-label" data-i18n="honourLine"></p>
            <p class="hero-date" data-i18n="heroDate"></p>
            <p class="hero-date" style="font-size: 1rem; margin-top: 4px;" data-i18n="heroYear"></p>
            <p class="hero-date-eth">ሚያዚያ 25, 2018 ዓ.ም.</p>
        </div>
    </section>

    <div class="tilet-border"></div>

    <!-- ===== PHOTO ===== -->
    <section class="photo-section fade-in">
        <div class="photo-frame">
            <img src="Images/First.jpg" alt="Eng. Dereje Itefa & Eng. Hawi Teshome" style="width:100%;height:100%;object-fit:cover;">
        </div>
    </section>

    <!-- ===== WEDDING DETAILS ===== -->
    <section class="details-section">
        <div class="fade-in">
            <h2 class="section-title" data-i18n="detailsTitle"></h2>
            <p class="section-subtitle" data-i18n="detailsSubtitle"></p>
        </div>

        <div class="details-grid">
            <div class="detail-card fade-in">
                <div class="detail-icon">&#128197;</div>
                <p class="detail-label" data-i18n="dateLabel"></p>
                <p class="detail-value" data-i18n-html="dateValue"></p>
            </div>

            <div class="detail-card fade-in">
                <div class="detail-icon">&#128336;</div>
                <p class="detail-label" data-i18n="timeLabel"></p>
                <p class="detail-value" data-i18n-html="timeValue"></p>
            </div>

            <div class="detail-card fade-in">
                <div class="detail-icon">&#9962;</div>
                <p class="detail-label" data-i18n="locationLabel"></p>
                <p class="detail-value" data-i18n-html="locationValue"></p>

                messageBody: 'Le cœur rempli de joie et de gratitude, nous vous invitons à partager la célébration de notre amour. Votre présence, vos prières et vos bénédictions comptent énormément pour nous alors que nous commençons ce beau voyage ensemble. Nous avons hâte de célébrer avec chacun d\'entre vous.',
                messageSig: 'Avec amour, Dereje & Hawi',
                mapTitle: 'Trouvez Votre Chemin',
                mapSubtitle: 'Lieu de la Cérémonie',
                mapHint: 'Ceci vous guidera directement vers notre maison où la cérémonie et la célébration auront lieu.',
                mapButton: 'Itinéraire vers Notre Maison',
                mapAddress: 'ጊንጪ ከተማ መልካ ኢሬቻ አዋሽ ቀበሌ፣ ሰባት ቁጥር መንገድ ፊት ለፊት',
                mapCallText: 'Besoin d\'aide pour nous trouver? Appelez-nous',
                wishesTitle: 'Voeux des Invités',
                wishesSubtitle: 'Laissez Votre Bénédiction',
                wishNamePlaceholder: 'Votre nom',
                wishMessagePlaceholder: 'Écrivez vos voeux pour les mariés...',
                wishSubmit: 'Envoyer les Voeux',
                wishSending: 'Envoi en cours...',
                wishSuccess: 'Merci pour votre bénédiction!',
                wishError: 'Une erreur est survenue. Veuillez réessayer.',
                wishesEmpty: 'Soyez le premier à laisser un voeu!',
                footerBlessing: 'Unis par l\'amour, nous vivrons dans l\'amour',
                footerDate: '3 mai 2026 · ሚያዚያ 25, 2018 ዓ.ም. · Ginchi'
            }
        };

        /* ========== i18n ENGINE ========== */
        let currentLang = localStorage.getItem('weddingLang') || 'en';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('weddingLang', lang);

            // Update body class for font overrides
            document.body.className = document.body.className.replace(/lang-\w+/g, '');
            document.body.classList.add('lang-' + lang);

            // Update html lang attribute
            const langMap = { en: 'en', am: 'am', om: 'om', fr: 'fr' };
            document.documentElement.lang = langMap[lang];

            // Update text content
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (T[lang] && T[lang][key] !== undefined) {
                    el.textContent = T[lang][key];
                }
            });

            // Update HTML content (for elements with <small> tags etc.)
            document.querySelectorAll('[data-i18n-html]').forEach(el => {
                const key = el.getAttribute('data-i18n-html');
                if (T[lang] && T[lang][key] !== undefined) {
                    el.innerHTML = T[lang][key];
                }
            });

            // Update placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (T[lang] && T[lang][key] !== undefined) {
                    el.placeholder = T[lang][key];
                }
            });

            // Update active button
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }

        // Attach click handlers
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
        });

        // Initialize
        setLanguage(currentLang);

        /* ========== COUNTDOWN TIMER ========== */
        function updateCountdown() {
            const now = new Date().getTime();
            const target = new Date(WEDDING_DATE).getTime();
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '0';
                document.getElementById('minutes').textContent = '0';
                document.getElementById('seconds').textContent = '0';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        /* ========== SCROLL FADE-IN ========== */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, {
            threshold: 0.15,
            rootMargin: '0px 0px -40px 0px'
        });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        /* ========== FALLING PETALS ========== */
        function createPetal() {
            const container = document.getElementById('petalContainer');
            const petal = document.createElement('div');
            petal.classList.add('petal');

            const colors = ['#C9A84C', '#E8D48B', '#6B2D3E', '#8B6548'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = 8 + Math.random() * 12;

            petal.innerHTML = `<svg viewBox="0 0 20 20" width="${size}" height="${size}">
                <ellipse cx="10" cy="10" rx="5" ry="9" fill="${color}" opacity="0.6"
                         transform="rotate(${Math.random() * 360} 10 10)"/>
            </svg>`;

            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (6 + Math.random() * 8) + 's';
            petal.style.animationDelay = Math.random() * 2 + 's';

            container.appendChild(petal);

            setTimeout(() => petal.remove(), 16000);
        }

        setInterval(createPetal, 1800);

        for (let i = 0; i < 5; i++) {
            setTimeout(createPetal, i * 400);
        }

        /* ========== GUEST WISHES ========== */
        const wishForm = document.getElementById('wishForm');
        const wishStatus = document.getElementById('wishStatus');
        const wishesList = document.getElementById('wishesList');
        const wishesEmpty = document.getElementById('wishesEmpty');

        // Submit wish — saves to Firestore (display on page) AND emails via FormSubmit
        wishForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nameEl = document.getElementById('wishName');
            const msgEl = document.getElementById('wishMessage');
            const btn = wishForm.querySelector('.wish-submit');
            const name = nameEl.value.trim();
            const message = msgEl.value.trim();

            if (!name || !message) return;

            btn.disabled = true;
            btn.textContent = T[currentLang].wishSending;
            wishStatus.textContent = '';
            wishStatus.className = 'wish-status';

            let success = false;

            // 1. Send email via FormSubmit.co
            try {
                await fetch('https://formsubmit.co/ajax/kenbonnurgi@gmail.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        _subject: 'New Wedding Wish from ' + name,
                        name: name,
                        message: message,
                        _template: 'table'
                    })
                });
                success = true;
            } catch (err) {
                console.error('Email send error:', err);
            }

            // 2. Also save to Firestore (for displaying on page)
            try {
                await db.collection('wishes').add({
                    name: name,
                    message: message,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                success = true;
            } catch (err) {
                console.error('Firestore error:', err);
            }

            if (success) {
                nameEl.value = '';
                msgEl.value = '';
                wishStatus.textContent = T[currentLang].wishSuccess;
            } else {
                wishStatus.textContent = T[currentLang].wishError;
                wishStatus.className = 'wish-status error';
            }

            btn.disabled = false;
            btn.textContent = T[currentLang].wishSubmit;
        });

        // Real-time listener for displaying wishes
        try {
            db.collection('wishes')
              .orderBy('createdAt', 'desc')
              .limit(10)
              .onSnapshot((snapshot) => {
                  wishesList.innerHTML = '';

                  if (snapshot.empty) {
                      wishesEmpty.style.display = 'block';
                      return;
                  }

                  wishesEmpty.style.display = 'none';

                  snapshot.forEach((doc) => {
                      const data = doc.data();
                      const card = document.createElement('div');
                      card.className = 'wish-card';

                      const ts = data.createdAt?.toDate();
                      const timeStr = ts ? ts.toLocaleDateString('en-US', {
                          month: 'short', day: 'numeric', year: 'numeric'
                      }) : '';

                      card.innerHTML = `
                          <div class="wish-card-name">${escapeHtml(data.name)}</div>
                          <div class="wish-card-message">${escapeHtml(data.message)}</div>
                          ${timeStr ? `<div class="wish-card-time">${timeStr}</div>` : ''}
                      `;
                      wishesList.appendChild(card);
                  });
              }, (err) => {
                  console.error('Firestore listener error:', err);
              });
        } catch (err) {
            console.error('Firestore init error:', err);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
